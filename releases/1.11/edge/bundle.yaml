  kfp-api:
    _github_repo_branch: track/2.15
    _github_repo_name: kfp-operators
    channel: 2.15/edge
    charm: kfp-api
    scale: 1
    trust: true
  kfp-db:
    _github_dependency_repo_branch: main
    _github_dependency_repo_name: mysql-k8s-operator
    channel: 8.0/stable
    charm: mysql-k8s
    constraints: mem=2G
    scale: 1
    trust: true
  kfp-metadata-writer:
    _github_repo_branch: track/2.15
    _github_repo_name: kfp-operators
    channel: 2.15/edge
    charm: kfp-metadata-writer
    scale: 1
    trust: true
  kfp-persistence:
    _github_repo_branch: track/2.15
    _github_repo_name: kfp-operators
    channel: 2.15/edge
    charm: kfp-persistence
    scale: 1
    trust: true
