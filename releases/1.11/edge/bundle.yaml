bundle: kubernetes
name: kubeflow
docs: https://discourse.charmhub.io/t/18106
applications:
  admission-webhook:
    _github_repo_branch: track/1.10
    _github_repo_name: admission-webhook-operator
    channel: 1.10/edge
    charm: admission-webhook
    scale: 1
    trust: true
  argo-controller:
    _github_repo_branch: track/3.7
    _github_repo_name: argo-operators
    channel: 3.7/edge
    charm: argo-controller
    scale: 1
    trust: true
  dex-auth:
    _github_repo_branch: track/2.41
    _github_repo_name: dex-auth-operator
    channel: 2.41/edge
    charm: dex-auth
    scale: 1
    trust: true
  envoy:
    _github_repo_branch: track/2.4
    _github_repo_name: envoy-operator
    channel: 2.4/edge
    charm: envoy
    scale: 1
    trust: true
  istio-ingressgateway:
    _github_repo_branch: track/1.28
    _github_repo_name: istio-operators
    channel: 1.28/edge
    charm: istio-gateway
    options:
      kind: ingress
    scale: 1
    trust: true
  istio-pilot:
    _github_repo_branch: track/1.28
    _github_repo_name: istio-operators
    channel: 1.28/edge
    charm: istio-pilot
    options:
      default-gateway: kubeflow-gateway
    scale: 1
    trust: true
  jupyter-controller:
    _github_repo_branch: track/1.10
    _github_repo_name: notebook-operators
    channel: 1.10/edge
    charm: jupyter-controller
    scale: 1
    trust: true
  jupyter-ui:
    _github_repo_branch: track/1.10
    _github_repo_name: notebook-operators
    channel: 1.10/edge
    charm: jupyter-ui
    scale: 1
    trust: true
  katib-controller:
    _github_repo_branch: track/0.19
    _github_repo_name: katib-operators
    channel: 0.19/edge
    charm: katib-controller
    scale: 1
    trust: true
  katib-db:
    _github_dependency_repo_branch: main
    _github_dependency_repo_name: mysql-k8s-operator
    channel: 8.0/stable
    charm: mysql-k8s
    constraints: mem=2G
    scale: 1
    trust: true
  katib-db-manager:
    _github_repo_branch: track/0.19
    _github_repo_name: katib-operators
    channel: 0.19/edge
    charm: katib-db-manager
    scale: 1
    trust: true
  katib-ui:
    _github_repo_branch: track/0.19
