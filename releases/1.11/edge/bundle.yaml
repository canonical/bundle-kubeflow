    _github_repo_branch: track/2.15
    _github_repo_name: kfp-operators
    channel: 2.15/edge
    charm: kfp-schedwf
    scale: 1
    trust: true
  kfp-ui:
    _github_repo_branch: track/2.15
    _github_repo_name: kfp-operators
    channel: 2.15/edge
    charm: kfp-ui
    scale: 1
    trust: true
  kfp-viewer:
    _github_repo_branch: track/2.15
    _github_repo_name: kfp-operators
    channel: 2.15/edge
    charm: kfp-viewer
    scale: 1
    trust: true
  kfp-viz:
    _github_repo_branch: track/2.15
    _github_repo_name: kfp-operators
