bundle: kubernetes
name: kubeflow
docs: https://discourse.charmhub.io/t/18106
applications:
  admission-webhook:
    charm: admission-webhook
    channel: latest/edge
    trust: true
    scale: 1
    _github_repo_name: admission-webhook-operator
    _github_repo_branch: main
  argo-controller:
    charm: argo-controller
    channel: latest/edge
    trust: true
    scale: 1
    _github_repo_name: argo-operators
    _github_repo_branch: main
  dex-auth:
    charm: dex-auth
    channel: latest/edge
    scale: 1
    trust: true
    _github_repo_name: dex-auth-operator
    _github_repo_branch: main
  envoy:
    charm: envoy
    channel: latest/edge
    scale: 1
    trust: true
    _github_repo_name: envoy-operator
    _github_repo_branch: main
  istio-beacon-k8s:
    charm: istio-beacon-k8s
    channel: 2/edge
    base: ubuntu@22.04/stable
    scale: 1
    trust: true
    _github_repo_name: istio-beacon-k8s-operator
    _github_repo_branch: track/2
  istio-ingress-k8s:
    charm: istio-ingress-k8s
    channel: 2/edge
    scale: 1
    trust: true
    _github_repo_name: istio-ingress-k8s-operator
    _github_repo_branch: track/2
  istio-k8s:
    charm: istio-k8s
    channel: 2/edge
    scale: 1
    trust: true
    _github_repo_name: istio-k8s-operator
    _github_repo_branch: track/2
  jupyter-controller:
    charm: jupyter-controller
    channel: latest/edge
    scale: 1
    trust: true
    _github_repo_name: notebook-operators
    _github_repo_branch: main
  jupyter-ui:
    charm: jupyter-ui
    channel: latest/edge
    scale: 1
    trust: true
    _github_repo_name: notebook-operators
    _github_repo_branch: main
  katib-controller:
    charm: katib-controller
    channel: latest/edge
    scale: 1
    trust: true
    _github_repo_name: katib-operators
    _github_repo_branch: main
  katib-db:
    charm: mysql-k8s
    channel: 8.0/edge
    base: ubuntu@22.04/stable
    scale: 3
    trust: true
    constraints: mem=2G
    _github_dependency_repo_name: mysql-k8s-operator
    _github_dependency_repo_branch: main
  katib-db-manager:
    charm: katib-db-manager
    channel: latest/edge
    scale: 1
    trust: true
    _github_repo_name: katib-operators
    _github_repo_branch: main
  katib-ui:
    charm: katib-ui
    channel: latest/edge
    scale: 1
    trust: true
    _github_repo_name: katib-operators
    _github_repo_branch: main
  kfp-api:
    charm: kfp-api
    channel: latest/edge
    scale: 1
    trust: true
    _github_repo_name: kfp-operators
    _github_repo_branch: main
  kfp-db:
    charm: mysql-k8s
    channel: 8.0/edge
    base: ubuntu@22.04/stable
    scale: 3
    trust: true
    constraints: mem=2G
    _github_dependency_repo_name: mysql-k8s-operator
    _github_dependency_repo_branch: main
  kfp-metadata-writer:
    charm: kfp-metadata-writer
    channel: latest/edge
    scale: 1
    trust: true
    _github_repo_name: kfp-operators
    _github_repo_branch: main
  kfp-persistence:
    charm: kfp-persistence
    channel: latest/edge
    scale: 1
    trust: true
    _github_repo_name: kfp-operators
    _github_repo_branch: main
  kfp-profile-controller:
    charm: kfp-profile-controller
    channel: latest/edge
    scale: 1
    trust: true
    _github_repo_name: kfp-operators
    _github_repo_branch: main
  kfp-schedwf:
    charm: kfp-schedwf
    channel: latest/edge
    scale: 1
    trust: true
    _github_repo_name: kfp-operators
    _github_repo_branch: main
  kfp-ui:
    charm: kfp-ui
    channel: latest/edge
    scale: 1
    trust: true
    _github_repo_name: kfp-operators
    _github_repo_branch: main
  kfp-viewer:
    charm: kfp-viewer
    channel: latest/edge
    scale: 1
    trust: true
    _github_repo_name: kfp-operators
    _github_repo_branch: main
  kfp-viz:
    charm: kfp-viz
    channel: latest/edge
    scale: 1
    trust: true
    _github_repo_name: kfp-operators
    _github_repo_branch: main
  kserve-controller:
    charm: kserve-controller
    channel: latest/edge
    scale: 1
    trust: true
    options:
      deployment-mode: rawdeployment
    _github_repo_name: kserve-operators
    _github_repo_branch: main
  kubeflow-dashboard:
    charm: kubeflow-dashboard
    channel: latest/edge
    scale: 1
    trust: true
    _github_repo_name: kubeflow-dashboard-operator
    _github_repo_branch: main
  kubeflow-profiles:
    charm: kubeflow-profiles
    channel: latest/edge
    scale: 1
    options:
      istio-gateway-principal: cluster.local/ns/kubeflow/sa/istio-ingress-k8s-istio
      service-mesh-mode: istio-ambient
    trust: true
    _github_repo_name: kubeflow-profiles-operator
    _github_repo_branch: main
  kubeflow-roles:
    charm: kubeflow-roles
    channel: latest/edge
    scale: 1
    trust: true
  kubeflow-trainer:
    charm: kubeflow-trainer
    channel: latest/edge
    scale: 1
    trust: true
  kubeflow-volumes:
    charm: kubeflow-volumes
    channel: latest/edge
    scale: 1
    trust: true
    _github_repo_name: kubeflow-volumes-operator
    _github_repo_branch: main
  metacontroller-operator:
    charm: metacontroller-operator
    channel: latest/edge
    scale: 1
    trust: true
    _github_repo_name: metacontroller-operator
    _github_repo_branch: main
  mlmd:
    charm: mlmd
    channel: latest/edge
    scale: 1
    trust: true
    _github_repo_name: mlmd-operator
    _github_repo_branch: main
  minio:
    charm: minio
    channel: latest/edge
    scale: 1
    trust: true
  oidc-gatekeeper:
    charm: oidc-gatekeeper
    channel: latest/edge
    scale: 1
    trust: true
  pvcviewer-operator:
    charm: pvcviewer-operator
    channel: latest/edge
    scale: 1
    trust: true
    _github_repo_name: pvcviewer-operator
    _github_repo_branch: main
  tensorboard-controller:
    charm: tensorboard-controller
    channel: latest/edge
    scale: 1
    trust: true
    _github_repo_name: kubeflow-tensorboards-operator
    _github_repo_branch: main
  tensorboards-web-app:
    charm: tensorboards-web-app
    channel: latest/edge
    scale: 1
    trust: true
    _github_repo_name: kubeflow-tensorboards-operator
    _github_repo_branch: main
  training-operator:
    charm: training-operator
    channel: latest/edge
    scale: 1
    trust: true
    _github_repo_name: training-operator
    _github_repo_branch: main
